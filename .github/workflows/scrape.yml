name: Scrape businesses

# Scrapes Berkeley businesses with no owned website into Supabase (durable)
# and reports run status to the CEO's Enterprise fleet dashboard (growth card).
#
# State lives in Supabase (see scraper/db.py + supabase/schema.sql), so runs
# persist across CI. The scraper skips silently (green, no report) when
# GOOGLE_MAPS_API_KEY isn't set, so this cron is safe to leave enabled before
# secrets are configured — it activates the moment the secret is added.
#
# Downstream stages — site generation (Vercel deploys, cost) and cold outreach
# (Resend, CAN-SPAM) — stay human-triggered and are intentionally NOT in CI.
#
# Required GitHub secrets (for the scrape to actually run):
#   GOOGLE_MAPS_API_KEY
#   SUPABASE_URL, SUPABASE_SERVICE_KEY   (durable state; run supabase/schema.sql once)
# Optional:
#   CEOS_REPORT_SECRET   (lights up the growth card on ceos-enterprise)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"  # 08:00 UTC daily

concurrency:
  group: berkeleybiz-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r scraper/requirements.txt

      - run: python scrape.py
        working-directory: scraper
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          CEOS_REPORT_SECRET: ${{ secrets.CEOS_REPORT_SECRET }}
