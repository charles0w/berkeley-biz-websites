name: Scrape businesses

# Scrapes Berkeley businesses with no owned website into Neon Postgres (durable)
# shared with the CEO's Enterprise fleet dashboard (growth card reads it directly).
#
# State lives in the ceos-enterprise Neon DB (businesses table), so runs
# persist across CI. The scraper skips silently when GOOGLE_MAPS_API_KEY isn't
# set, so this cron is safe to leave enabled before secrets are configured.
#
# Downstream stages — site generation (Vercel deploys, cost) and cold outreach
# (Resend, CAN-SPAM) — stay human-triggered and are intentionally NOT in CI.
#
# Required GitHub secrets:
#   GOOGLE_MAPS_API_KEY
#   DATABASE_URL   (Neon unpooled URL — copy from ceos-enterprise Vercel project)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"  # 08:00 UTC daily

concurrency:
  group: berkeleybiz-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r scraper/requirements.txt

      - run: python scrape.py
        working-directory: scraper
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
